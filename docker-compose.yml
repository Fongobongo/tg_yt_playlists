version: '3.8'

services:
  bot:
    build: .
    container_name: tg_yt_bot
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      DATABASE_URL: sqlite:///data/tg_yt.db
      LOG_LEVEL: DEBUG
    volumes:
      - ./data:/app/data   # persist DB and logs on host
    restart: unless-stopped